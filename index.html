<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>格言庫 / Kakugenko - Legal</title>
<script>
  (function() {
    var lang = (navigator.language || 'ja').toLowerCase();
    var locale = lang.indexOf('en') === 0 ? 'en' : 'ja';
    location.replace('./' + locale + '/');
  })();
</script>
<noscript>
  <meta http-equiv="refresh" content="0; url=./ja/">
</noscript>
</head>
<body>
  <p><a href="./ja/">日本語</a> / <a href="./en/">English</a></p>
</body>
</html>
