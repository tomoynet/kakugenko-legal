<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ - 格言庫</title>
<meta name="description" content="格言庫（KakugenKo）のお問い合わせフォーム">
<link rel="stylesheet" href="../../assets/style.css">
</head>
<body>
<header>
  <nav class="container" style="padding-top:16px;padding-bottom:16px;">
    <a href="../">← 格言庫 法的文書</a>
  </nav>
</header>
<main>
  <div class="container">
    <h1>お問い合わせ</h1>
    <p class="subtitle">格言庫（KakugenKo）</p>
    <p>格言庫に関するご質問・ご要望・不具合報告はこちらのフォームからお送りください。</p>
    <p>個人開発のアプリのため、ご返答にお時間をいただく場合があります。あらかじめご了承ください。</p>

    <form id="contactForm" class="contact-form">
      <input type="hidden" name="access_key" value="94368241-10fe-479d-a925-8d25e8a4f6bb">
      <input type="hidden" name="from_name" value="格言庫 お問い合わせ">
      <input type="hidden" name="subject" value="【格言庫】お問い合わせ">
      <input type="checkbox" name="botcheck" class="hidden" tabindex="-1" autocomplete="off">

      <label for="name">お名前<span class="req">*</span></label>
      <input type="text" id="name" name="name" required autocomplete="name">

      <label for="email">メールアドレス<span class="req">*</span></label>
      <input type="email" id="email" name="email" required autocomplete="email">

      <label for="type">お問い合わせの種類</label>
      <select id="type" name="type">
        <option value="ご意見・ご要望">ご意見・ご要望</option>
        <option value="バグ報告">バグ報告</option>
        <option value="機能要望">機能要望</option>
        <option value="プライバシーポリシーについて">プライバシーポリシーについて</option>
        <option value="その他">その他</option>
      </select>

      <label for="version">アプリのバージョン（任意）</label>
      <input type="text" id="version" name="version" placeholder="例: 1.0.0">

      <label for="message">内容<span class="req">*</span></label>
      <textarea id="message" name="message" required placeholder="できるだけ具体的にお書きください"></textarea>

      <button type="submit" id="submitBtn">送信する</button>
      <div id="result" class="result"></div>
    </form>
  </div>
</main>
<footer>
  <a href="../../en/kakugenko/contact.html">English</a>
  <p class="copyright">© 2026 Tomoyuki Kimura</p>
</footer>

<script>
  const form = document.getElementById('contactForm');
  const btn = document.getElementById('submitBtn');
  const result = document.getElementById('result');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = '送信中…';
    result.className = 'result';
    result.textContent = '';

    const data = new FormData(form);

    try {
      const response = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        body: data,
      });
      const json = await response.json();
      if (response.status === 200) {
        result.className = 'result success';
        result.textContent = 'お問い合わせを送信しました。ご連絡ありがとうございます。';
        form.reset();
      } else {
        result.className = 'result error';
        result.textContent = json.message || '送信に失敗しました。時間をおいて再度お試しください。';
      }
    } catch (err) {
      result.className = 'result error';
      result.textContent = '通信エラーが発生しました。時間をおいて再度お試しください。';
    } finally {
      btn.disabled = false;
      btn.textContent = '送信する';
    }
  });
</script>
</body>
</html>
