<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - KakugenKo</title>
<meta name="description" content="Contact form for KakugenKo (格言庫)">
<link rel="stylesheet" href="../../assets/style.css">
</head>
<body>
<header>
  <nav class="container" style="padding-top:16px;padding-bottom:16px;">
    <a href="../">← KakugenKo Legal</a>
  </nav>
</header>
<main>
  <div class="container">
    <h1>Contact</h1>
    <p class="subtitle">KakugenKo (格言庫)</p>
    <p>Have a question, feedback, or found a bug? Fill out the form below and we'll get back to you.</p>
    <p>Please note that response times may vary as this is an independently developed app.</p>

    <form id="contactForm" class="contact-form">
      <input type="hidden" name="access_key" value="94368241-10fe-479d-a925-8d25e8a4f6bb">
      <input type="hidden" name="from_name" value="KakugenKo Contact">
      <input type="hidden" name="subject" value="[KakugenKo] Contact">
      <input type="checkbox" name="botcheck" class="hidden" tabindex="-1" autocomplete="off">

      <label for="name">Name<span class="req">*</span></label>
      <input type="text" id="name" name="name" required autocomplete="name">

      <label for="email">Email address<span class="req">*</span></label>
      <input type="email" id="email" name="email" required autocomplete="email">

      <label for="type">Type of inquiry</label>
      <select id="type" name="type">
        <option value="Feedback / Suggestion">Feedback / Suggestion</option>
        <option value="Bug Report">Bug Report</option>
        <option value="Feature Request">Feature Request</option>
        <option value="Privacy Policy">Privacy Policy</option>
        <option value="Other">Other</option>
      </select>

      <label for="version">App version (optional)</label>
      <input type="text" id="version" name="version" placeholder="e.g. 1.0.0">

      <label for="message">Message<span class="req">*</span></label>
      <textarea id="message" name="message" required placeholder="Please describe your question or issue in as much detail as possible."></textarea>

      <button type="submit" id="submitBtn">Send Message</button>
      <div id="result" class="result"></div>
    </form>
  </div>
</main>
<footer>
  <a href="../../ja/kakugenko/contact.html">日本語</a>
  <p class="copyright">© 2026 Tomoyuki Kimura</p>
</footer>

<script>
  const form = document.getElementById('contactForm');
  const btn = document.getElementById('submitBtn');
  const result = document.getElementById('result');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = 'Sending…';
    result.className = 'result';
    result.textContent = '';

    const data = new FormData(form);

    try {
      const response = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        body: data,
      });
      const json = await response.json();
      if (response.status === 200) {
        result.className = 'result success';
        result.textContent = 'Your message has been sent. Thank you for reaching out!';
        form.reset();
      } else {
        result.className = 'result error';
        result.textContent = json.message || 'Something went wrong. Please try again later.';
      }
    } catch (err) {
      result.className = 'result error';
      result.textContent = 'A network error occurred. Please try again later.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send Message';
    }
  });
</script>
</body>
</html>
